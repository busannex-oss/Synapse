
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYNAPSE</title>
    <meta name="theme-color" content="#111318" />
    <meta name="description" content="Neural Market Intelligence & Autonomous Growth" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SYNAPSE" />
    <link rel="synapse-touch-icon" href="/logo.svg" />
    <style>
      :root {
        --cyan: #00f2ff;
        --cyan-dim: rgba(0, 242, 255, 0.1);
        --cyan-border: rgba(0, 242, 255, 0.2);
        --glass: rgba(17, 19, 24, 0.9);
        --bg: #111318;
      }
      
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: var(--bg);
        color: #e2e8f0;
        overflow: hidden;
        height: 100vh;
        background-image: 
          linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px, 40px 40px;
        position: relative;
      }

      /* Pulsing Grid Overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05), transparent 70%);
        animation: pulse-bg 8s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes pulse-bg {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.1); }
      }
      
      /* Scanline Effect */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
        background-size: 100% 3px, 3px 100%;
        pointer-events: none;
        z-index: 1000;
        opacity: 0.2;
      }

      /* Remove redundant watermark from index.html as it's handled in App.tsx */
      .app-watermark { display: none; }

      .watermark-text {
        font-size: 12vw;
        font-weight: 900;
        letter-spacing: 3vw;
        color: var(--cyan);
        text-transform: uppercase;
        filter: blur(8px);
      }

      /* Neural HUD Panel */
      .hud-panel {
        background: var(--glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--cyan-border);
        border-radius: 4px;
        position: relative;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.02);
      }

      /* Technical Corner Accents */
      .hud-panel::before, .hud-panel::after {
        content: "";
        position: absolute;
        width: 10px;
        height: 10px;
        border-color: var(--cyan);
        border-style: solid;
        pointer-events: none;
        opacity: 0.5;
      }

      .hud-panel::before {
        top: -1px;
        left: -1px;
        border-width: 2px 0 0 2px;
      }

      .hud-panel::after {
        bottom: -1px;
        right: -1px;
        border-width: 0 2px 2px 0;
      }

      .cyan-text {
        color: var(--cyan);
        text-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
        letter-spacing: 0.05em;
      }

      .mono-data { 
        font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace; 
        font-size: 0.65rem; 
        color: #64748b; 
        letter-spacing: -0.02em;
      }

      @keyframes flicker {
        0% { opacity: 0.97; }
        5% { opacity: 0.95; }
        10% { opacity: 0.9; }
        15% { opacity: 0.95; }
        20% { opacity: 0.98; }
        25% { opacity: 0.95; }
        30% { opacity: 0.9; }
        35% { opacity: 0.95; }
        40% { opacity: 0.98; }
        45% { opacity: 0.95; }
        50% { opacity: 0.9; }
        55% { opacity: 0.95; }
        60% { opacity: 0.98; }
        65% { opacity: 0.95; }
        70% { opacity: 0.9; }
        75% { opacity: 0.95; }
        80% { opacity: 0.98; }
        85% { opacity: 0.95; }
        90% { opacity: 0.9; }
        95% { opacity: 0.95; }
        100% { opacity: 0.98; }
      }

      .hud-panel {
        animation: flicker 10s infinite;
      }

      ::-webkit-scrollbar { width: 2px; height: 2px; }
      ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 0; }
      ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }

    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
