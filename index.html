
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYNAPSE | Neural HUD Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;700;900&family=JetBrains+Mono:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --hud-cyan: #00f2ff;
        --hud-cyan-dim: rgba(0, 242, 255, 0.15);
        --hud-amber: #ff9a00;
        --hud-alert: #ff3d00;
        --hud-void: #05070a;
        --hud-border: rgba(0, 242, 255, 0.2);
      }
      
      body {
        font-family: 'JetBrains Mono', monospace;
        background-color: var(--hud-void);
        color: #e2e8f0;
        overflow: hidden;
        height: 100vh;
        /* Technical Grid Overlay */
        background-image: 
          linear-gradient(var(--hud-cyan-dim) 1px, transparent 1px),
          linear-gradient(90deg, var(--hud-cyan-dim) 1px, transparent 1px);
        background-size: 40px 40px;
        background-position: center center;
      }

      /* Background Watermark */
      .app-watermark {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0.025;
        user-select: none;
        white-space: nowrap;
        transition: all 0.5s ease;
      }

      .watermark-logo {
        width: 35vw;
        height: 35vw;
        color: var(--hud-cyan);
        filter: blur(4px);
      }

      .watermark-text {
        font-size: 12vw;
        font-weight: 100;
        letter-spacing: 4vw;
        color: var(--hud-cyan);
        text-transform: uppercase;
        margin-top: -2vw;
        filter: blur(1px);
        font-family: 'Inter', sans-serif;
      }

      /* HUD Panel with Bracket Corners */
      .hud-panel {
        background: rgba(0, 242, 255, 0.015);
        backdrop-filter: blur(16px);
        border: 1px solid var(--hud-border);
        position: relative;
        box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.05);
        z-index: 10;
      }

      .hud-panel::before, .hud-panel::after {
        content: "";
        position: absolute;
        width: 15px;
        height: 15px;
        border: 2px solid var(--hud-cyan);
      }
      .hud-panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
      .hud-panel::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

      .kimoyo-orb {
        width: 52px;
        height: 52px;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid var(--hud-border);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .kimoyo-orb:hover {
        background: var(--hud-cyan-dim);
        border-color: var(--hud-cyan);
        box-shadow: 0 0 15px var(--hud-cyan-dim);
      }

      .kimoyo-orb.active {
        background: var(--hud-cyan);
        box-shadow: 0 0 25px var(--hud-cyan);
      }
      
      .kimoyo-orb.active svg {
        color: black !important;
      }

      .cyan-text {
        color: var(--hud-cyan);
        text-shadow: 0 0 8px rgba(0, 242, 255, 0.5);
      }

      .mono-data { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: #64748b; }

      /* Scanning Line Animation */
      .scanline {
        position: absolute;
        width: 100%;
        height: 100px;
        background: linear-gradient(to bottom, transparent, rgba(0, 242, 255, 0.05), transparent);
        animation: scan 8s linear infinite;
        pointer-events: none;
        z-index: 20;
      }

      @keyframes scan {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(1000%); }
      }

      .animate-spin-slow {
        animation: spin 180s linear infinite;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-thumb { background: var(--hud-cyan); border-radius: 10px; }
      ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }

      .glitch-hover:hover {
        animation: glitch 0.2s infinite;
      }

      @keyframes glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-2px, 1px); }
        40% { transform: translate(-2px, -1px); }
        60% { transform: translate(2px, 1px); }
        80% { transform: translate(2px, -1px); }
        100% { transform: translate(0); }
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react/": "https://esm.sh/react@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
